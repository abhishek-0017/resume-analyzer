<!DOCTYPE html>
<html>
<head>
  <title>Resume Analyzer</title>

  <!-- ✅ Bootstrap CDN (no install needed) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

  <h1 class="text-center mb-4">🚀 Resume Analyzer</h1>

  <div class="card p-4 bg-secondary">

    <!-- File Input -->
    <input type="file" id="fileInput" class="form-control mb-3">

    <!-- Upload Button -->
    <button class="btn btn-primary w-100 mb-2" onclick="upload()">
      Upload Resume
    </button>

    <!-- History Button -->
    <button class="btn btn-success w-100" onclick="getHistory()">
      Show History
    </button>

  </div>

  <!-- Result -->
  <div id="result" class="mt-4"></div>

  <!-- History -->
  <div id="history" class="mt-4"></div>

</div>

<script>

async function upload() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Please select a file");
    return;
  }

  const formData = new FormData();
  formData.append("resume", file);

  const res = await fetch("http://localhost:5000/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  document.getElementById("result").innerHTML = `
    <div class="card p-3 bg-dark text-white">
      <h4>Analysis Result:</h4>
      <pre>${data.analysis}</pre>
    </div>
  `;
}

async function getHistory() {
  const res = await fetch("http://localhost:5000/resumes");
  const data = await res.json();

  let html = "<h3>📜 History</h3>";

  data.forEach(item => {
    html += `
      <div class="card p-3 mb-2 bg-dark text-white">
        <strong>${item.fileName}</strong>
        <pre>${item.analysis}</pre>
      </div>
    `;
  });

  document.getElementById("history").innerHTML = html;
}

</script>

</body>
</html>
